workflows:
  android-build:
    name: RevOx Android Release Build

    environment:
      android_signing:
        - revox

      java: 21

    scripts:

      - name: Install dependencies
        script: |
          cd mobile
          npm install

      - name: Sync Capacitor
        script: |
          cd mobile
          npx cap sync android

      - name: Build APK
        script: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK
        script: |
          mv mobile/android/app/build/outputs/apk/release/app-release.apk mobile/android/app/build/outputs/apk/release/RevOx.apk

    artifacts:
      - mobile/android/app/build/outputs/apk/release/RevOx.apk
