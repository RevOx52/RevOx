workflows:
  android-build:
    name: RevOx Android Build

    environment:
      android_signing:
        - debug_keystore

    scripts:
      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        script: |
          mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/RevOx.apk

    artifacts:
      - android/app/build/outputs/apk/debug/RevOx.apk
