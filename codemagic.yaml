workflows:

  android-build:

    name: RevOx Android Build


    environment:

      java: 21

      android_signing:
        - revox



    scripts:


      - name: Install dependencies

        script: |

          cd mobile

          npm install

          npm install @capacitor/android @capacitor/core @capacitor/cli

          npm install @capacitor/assets --save-dev



      - name: Generate RevOx icon

        script: |

          cd mobile

          npx capacitor-assets generate



      - name: Auto update version

        script: |

          cd mobile/android


          python3 <<'PY'

          import re
          import os


          path = "app/build.gradle"


          with open(path, "r") as f:
              data = f.read()


          build_number = os.environ.get(
              "BUILD_NUMBER",
              "1"
          )


          version_code = build_number

          version_name = "1." + build_number


          data = re.sub(
              r'versionCode\s+\d+',
              f'versionCode {version_code}',
              data
          )


          data = re.sub(
              r'versionName\s+"[^"]+"',
              f'versionName "{version_name}"',
              data
          )


          with open(path, "w") as f:
              f.write(data)


          print(
              "RevOx version:",
              version_name
          )

          print(
              "Version code:",
              version_code
          )


          PY



      - name: Sync Capacitor

        script: |

          cd mobile

          npx cap sync android



      - name: Build APK

        script: |

          cd mobile/android

          chmod +x gradlew

          ./gradlew assembleRelease



      - name: Find APK

        script: |

          echo "Searching APK..."

          find mobile/android -name "*.apk"



      - name: Sign APK

        script: |

          APK=$(find mobile/android/app/build/outputs/apk -name "*.apk" | head -1)


          echo "Signing:"
          echo "$APK"


          $ANDROID_HOME/build-tools/36.0.0/apksigner sign \
          --ks $CM_KEYSTORE_PATH \
          --ks-alias $CM_KEY_ALIAS \
          --ks-pass pass:$CM_KEYSTORE_PASSWORD \
          --key-pass pass:$CM_KEY_PASSWORD \
          "$APK"



          $ANDROID_HOME/build-tools/36.0.0/apksigner verify \
          --verbose "$APK"



      - name: Prepare APK

        script: |

          mkdir -p output


          APK=$(find mobile/android/app/build/outputs/apk -name "*.apk" | head -1)


          cp "$APK" output/RevOx.apk




    artifacts:

      - output/RevOx.apk
