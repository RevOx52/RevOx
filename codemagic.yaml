workflows:
  android-debug:
    name: RevOx Build APK

    environment:
      java: 17

    scripts:

      - name: Install Node packages
        script: |
          npm install

      - name: Install mobile packages
        script: |
          cd mobile
          npm install

      - name: Build Android APK
        script: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - mobile/android/app/build/outputs/apk/debug/*.apk
