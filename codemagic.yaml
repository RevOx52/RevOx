workflows:
  android-build:
    name: RevOx Android Build

    environment:
      java: 21

      android_signing:
        - revox

    scripts:

      - name: Install dependencies
        script: |
          cd mobile
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Sync Capacitor
        script: |
          cd mobile
          npx cap sync android

      - name: Build Release APK
        script: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK
        script: |
          APK=app/build/outputs/apk/release/app-release-unsigned.apk

          if [ ! -f "$APK" ]; then
            APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          fi

          echo "Signing: $APK"

          $CM_BUILD_DIR/signing/sign_apk.sh "$APK"

      - name: Rename APK
        script: |
          APK=$(find mobile/android/app/build/outputs/apk -name "*.apk" | head -1)

          mkdir -p output

          cp "$APK" output/RevOx.apk

      - name: Verify APK
        script: |
          $ANDROID_HOME/build-tools/36.0.0/apksigner verify --verbose output/RevOx.apk

    artifacts:
      - output/RevOx.apk
