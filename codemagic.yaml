workflows:
  android-build:
    name: RevOx Android Release Build

    environment:
      java: 21

      android_signing:
        - revox

      vars:
        PACKAGE_NAME: "com.revox.messenger"

    scripts:

      - name: Install dependencies
        script: |
          cd mobile
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Sync Capacitor
        script: |
          cd mobile
          npx cap sync android

      - name: Build APK
        script: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK
        script: |
          echo "Signing APK"
          $CM_BUILD_DIR/signing/verify_apk.sh

      - name: Rename APK
        script: |
          mv mobile/android/app/build/outputs/apk/release/app-release.apk \
          mobile/android/app/build/outputs/apk/release/RevOx.apk

    artifacts:
      - mobile/android/app/build/outputs/apk/release/RevOx.apk
