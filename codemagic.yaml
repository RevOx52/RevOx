workflows:
  android-build:
    name: RevOx Android APK

    max_build_duration: 60

    environment:
      java: 21

    scripts:
      - name: Install root dependencies
        script: |
          npm install

      - name: Install mobile dependencies
        script: |
          cd mobile
          npm install

      - name: Build Android APK
        script: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - mobile/android/app/build/outputs/apk/RevOx/*.apk
