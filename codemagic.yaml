workflows:
  android-build:
    name: RevOx Android Build

    max_build_duration: 60

    environment:
      node: latest
      java: 21

    scripts:
      - name: Install Node dependencies
        script: |
          cd mobile
          npm install

      - name: Build Android APK
        script: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - mobile/android/app/build/outputs/**/*.apk

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - mobile/node_modules
