workflows:
  android-build:
    name: RevOx Android Build

    max_build_duration: 60

    environment:
      node: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build Android
        script: |
          cd android
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk
