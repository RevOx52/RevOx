workflows:
  android-build:
    name: RevOx Android Release Build

    environment:
      android_signing:
        - revox

      java: 21

    scripts:

      - name: Install dependencies
        script: |
          cd mobile
          npm install

      - name: Sync Capacitor
        script: |
          cd mobile
          npx cap sync android

      - name: Build APK
        script: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Find APK
        script: |
          find mobile/android -name "*.apk"

      - name: Rename APK
        script: |
          APK=$(find mobile/android -name "*.apk" | head -n 1)
          cp "$APK" mobile/android/RevOx.apk

    artifacts:
      - mobile/android/RevOx.apk
