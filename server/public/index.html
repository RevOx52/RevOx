<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RevOx</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="screen">

<div class="card">

<div class="logo">
RevOx
</div>

<h1>Вход в RevOx</h1>

<p class="hint">
Введите email для входа или регистрации
</p>


<div class="input-box">

<span class="mail-icon">✉</span>

<input 
id="email"
type="email"
placeholder="Email"
autocomplete="email">

</div>


<button id="continue">
Продолжить
</button>


<p id="status"></p>


</div>

</div>


<script src="index.js"></script>

</body>
</html>
