<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RevOx Password</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="screen">

<div class="card">


<div class="logo">
RevOx
</div>


<h1>
Создайте пароль
</h1>


<p class="hint">
Пароль нужен для входа в аккаунт
</p>



<div class="input-box">


<input
id="password"
type="password"
placeholder="Пароль"
/>


</div>



<div class="input-box">


<input
id="confirm"
type="password"
placeholder="Повторите пароль"
/>


</div>




<button id="create">

Продолжить

</button>



<p id="status"></p>



</div>

</div>



<script src="password.js"></script>


</body>

</html>
