<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RevOx — Профиль</title>


<link rel="stylesheet" href="auth.css">


</head>


<body>


<div class="auth">


<div class="auth-card">



<div class="avatar-section">


<div class="avatar-wrapper">


<img id="avatarPreview">


<div id="avatarLetter">
?
</div>


</div>




<label for="avatar" class="avatar-button">

Добавить фото

</label>



<input

id="avatar"

type="file"

accept="image/*"

hidden

>



</div>







<h1>
Ваш профиль
</h1>




<p class="subtitle">
Расскажите о себе
</p>








<input

id="firstName"

type="text"

placeholder="Имя"

autocomplete="given-name"

>






<input

id="lastName"

type="text"

placeholder="Фамилия"

autocomplete="family-name"

>







<button

class="main-btn"

id="continue"

>

Продолжить

</button>







<p id="status" class="status"></p>





</div>


</div>





<script src="profile.js"></script>


</body>


</html>
