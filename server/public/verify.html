<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RevOx - Verify</title>


<link rel="stylesheet" href="css/base.css">

<link rel="stylesheet" href="css/verify.css">


</head>


<body>


<div class="auth-container">


<div class="logo">
RevOx
</div>


<h1 class="verify-title">
Подтверждение
</h1>


<p class="verify-description">
Введите код из письма
</p>



<input

id="code"

class="code-input"

type="text"

maxlength="6"

placeholder="000000"

inputmode="numeric"

>



<button

id="verify"

class="verify-button"

>
Проверить
</button>



<div id="status"></div>



<div class="timer">
Код действует 5 минут
</div>



</div>



<script src="verify.js"></script>


</body>

</html>
